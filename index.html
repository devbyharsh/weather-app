<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Weather app</title>
</head>

<body>
    <div class="container">
        <div>
            <input type="text" placeholder="Search Location" id="input">
            <button class="btn" id="btn">Search</button>
        </div>
        <h1 id="loction"></h1>
        <p id="temp"></p>


        <div class="stats">
            <div>
                <h3>Time</h3>
                <p id="time"></p>
            </div>
            <div>
                <h3>Humidity</h3>
                <p id="humidity"></p>
            </div>
            <div>
                <h3>Wind</h3>
                <p id="wind"></p>
            </div>
            <div>
                <h3>Feels Like</h3>
                <p id="feels"></p>
            </div>
        </div>
    </div>



    <script src="script.js"></script>
</body>

</html>
